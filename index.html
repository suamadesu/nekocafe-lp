<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ねこカフェ もふ日和 | スマホ向けLP</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="lp">
      <section class="hero">
        <p class="tag">猫に癒やされる、やさしい時間</p>
        <h1>ねこカフェ もふ日和</h1>
        <p class="lead">
          ふかふかの猫たちと、ほっとひと息。<br />
          駅から3分の小さな猫カフェです。
        </p>
        <a class="btn" href="#reserve">空席を確認して予約する</a>
      </section>

      <section class="section features" id="features">
        <h2>特徴</h2>
        <ul>
          <li>人懐っこい保護猫スタッフが常時10匹以上</li>
          <li>木のぬくもりを感じる、静かな癒やし空間</li>
          <li>フリードリンク付きでゆっくり過ごせる</li>
        </ul>
      </section>

      <section class="section menu" id="menu">
        <h2>メニュー</h2>
        <div class="card">
          <p><strong>30分コース</strong>：900円</p>
          <p><strong>60分コース</strong>：1,500円</p>
          <p><strong>延長10分</strong>：250円</p>
          <p><strong>学生割引</strong>：平日100円OFF</p>
        </div>
      </section>

      <section class="section reserve" id="reserve">
        <h2>予約</h2>
        <p>混雑しやすい土日は事前予約がおすすめです。</p>
        <a class="btn" href="#">WEB予約へ進む</a>
      </section>
    </main>
  </body>
</html>
